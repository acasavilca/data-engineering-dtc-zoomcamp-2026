services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "ny_taxi"
    volumes:
      - "ny_taxi_postgres_data:/var/lib/postgresql"
    ports:
      - "5433:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"

  ingestor:
    build: .
    image: taxi_ingest:v001
    profiles: ["ingest"] # This service won't start with 'docker compose up'
    environment:
      - PG_USER=root
      - PG_PASS=root
      - PG_HOST=pgdatabase
      - PG_PORT=5432
      - PG_DB=ny_taxi
      - CHUNKSIZE=100000
    depends_on:
      pgdatabase:
        condition: service_started

volumes:
  ny_taxi_postgres_data:
  pgadmin_data:
